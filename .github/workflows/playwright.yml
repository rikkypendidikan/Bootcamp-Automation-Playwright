name: Playwright Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    container:
      image: kydockertest/bootcamp-automation-playwright:base
      options: --user root

    env:
      NODE_ENV: production
      PRODUCTION_BASE_URL: ${{ secrets.BASE_URL }}
      PRODUCTION_EMAIL: ${{ secrets.EMAIL_EMRA_PROD }}
      PRODUCTION_PASSWORD: ${{ secrets.PASSWORD_EMRA_PROD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tests
        run: npx playwright test --workers=1
        continue-on-error: true

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Parse Report
        if: always()
        run: node scripts/parse-playwright-report.js

      - name: Send Telegram Notification
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="вњ… PASSED"
          else
            STATUS="вќЊ FAILED"
          fi

          MESSAGE=$(printf "рџљЂ EMRA AUTOMATION\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\n%s\n\nрџ“Љ TEST SUMMARY\n\nвњ… Passed : %s\nвќЊ Failed : %s\nвљЄ Skipped : %s\nвЏ± Duration : %ss\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nвќЊ Errors\n%s\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nрџЊЌ Env\nProduction\n\nрџ‘¤ Trigger\n%s\n\nрџЊї Branch\n%s\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nрџ”— Workflow\nhttps://github.com/%s/actions/runs/%s\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nрџ¤– Playwright PRO REPORT" \
            "$STATUS" \
            "${PASSED:-0}" \
            "${FAILED:-0}" \
            "${SKIPPED:-0}" \
            "${DURATION:-0}" \
            "${ERRORS:-No errors}" \
            "${{ github.actor }}" \
            "${{ github.ref_name }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"