name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    container:
      image: kydockertest/bootcamp-automation-playwright:base
      options: --user root

    env:
      # =========================
      # CI ENV CONFIG (PRODUCTION)
      # =========================
      NODE_ENV: production

      # Base URL + credentials dari GitHub Secrets
      PROD_BASE_URL: ${{ secrets.BASE_URL }}
      PROD_EMAIL: ${{ secrets.EMAIL }}
      PROD_PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --workers=1

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30