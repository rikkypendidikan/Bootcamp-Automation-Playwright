name: Playwright Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Playwright Automation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    container:
      image: kydockertest/bootcamp-automation-playwright:base
      options: --user root

    env:
      CI: true
      TEST_ENV: production
      AGENTQ_ENABLE: true

      PRODUCTION_BASE_URL: ${{ secrets.BASE_URL }}
      PRODUCTION_EMAIL: ${{ secrets.EMAIL_EMRA_PROD }}
      PRODUCTION_PASSWORD: ${{ secrets.PASSWORD_EMRA_PROD }}

      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_EMAIL: ${{ secrets.STAGING_EMAIL }}
      STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}

      AGENTQ_API_URL: ${{ secrets.AGENTQ_BASE_URL }}
      AGENTQ_PROJECT_ID: ${{ secrets.AGENTQ_PROJECT_ID }}
      AGENTQ_TESTRUN_ID: ${{ secrets.AGENTQ_TESTRUN_ID }}
      AGENTQ_EMAIL: ${{ secrets.AGENTQ_EMAIL }}
      AGENTQ_PASSWORD: ${{ secrets.AGENTQ_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci

      - name: Verify Playwright
        run: npm ls @playwright/test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify AgentQ Configuration
        run: |
          echo "AGENTQ_API_URL: ${AGENTQ_API_URL:+SET}"
          echo "AGENTQ_PROJECT_ID: ${AGENTQ_PROJECT_ID:+SET}"
          echo "AGENTQ_TESTRUN_ID: ${AGENTQ_TESTRUN_ID:+SET}"

      - name: Run Playwright Tests
        id: playwright
        run: |
          NODE_ENV=$TEST_ENV npx playwright test --workers=1
        continue-on-error: true

      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Parse Report
        if: always()
        run: node scripts/parse-playwright-report.js

      # =====================================================
      # TELEGRAM SAFE (FINAL STABLE VERSION)
      # =====================================================
      - name: Send Telegram Notification
        if: always()
        shell: bash
        env:
          STATUS: ${{ steps.playwright.outcome }}

        run: |
          if [ "$STATUS" = "success" ]; then
            RESULT="✅ PASSED"
          else
            RESULT="❌ FAILED"
          fi

          FILE="telegram_message.txt"
          rm -f $FILE

          echo "🚀 EMRA AUTOMATION REPORT" >> $FILE
          echo "━━━━━━━━━━━━━━━━━━━━━━" >> $FILE
          echo "" >> $FILE

          echo "$RESULT" >> $FILE
          echo "" >> $FILE

          echo "📊 TEST SUMMARY" >> $FILE
          echo "✅ Passed  : ${PASSED:-0}" >> $FILE
          echo "❌ Failed  : ${FAILED:-0}" >> $FILE
          echo "⚪ Skipped : ${SKIPPED:-0}" >> $FILE
          echo "⏱ Duration : ${DURATION:-0}s" >> $FILE
          echo "" >> $FILE

          echo "━━━━━━━━━━━━━━━━━━━━━━" >> $FILE
          echo "" >> $FILE

          echo "❌ ERRORS" >> $FILE
          echo "${ERRORS:-Tidak ada error}" >> $FILE
          echo "" >> $FILE

          echo "━━━━━━━━━━━━━━━━━━━━━━" >> $FILE
          echo "" >> $FILE

          echo "🌍 ENVIRONMENT : $TEST_ENV" >> $FILE
          echo "👤 TRIGGER     : ${{ github.actor }}" >> $FILE
          echo "🌿 BRANCH      : ${{ github.ref_name }}" >> $FILE
          echo "" >> $FILE

          echo "━━━━━━━━━━━━━━━━━━━━━━" >> $FILE
          echo "" >> $FILE

          echo "🔗 WORKFLOW URL" >> $FILE
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $FILE

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text@$FILE

      - name: Mark Workflow Failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1