name: Playwright Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Playwright Automation

    runs-on: ubuntu-latest

    timeout-minutes: 60

    container:
      image: kydockertest/bootcamp-automation-playwright:base
      options: --user root

    env:
      # Environment aplikasi
      TEST_ENV: production

      PRODUCTION_BASE_URL: ${{ secrets.BASE_URL }}
      PRODUCTION_EMAIL: ${{ secrets.EMAIL_EMRA_PROD }}
      PRODUCTION_PASSWORD: ${{ secrets.PASSWORD_EMRA_PROD }}

      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_EMAIL: ${{ secrets.STAGING_EMAIL }}
      STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci

      - name: Verify Playwright
        run: npm ls @playwright/test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        id: playwright
        run: |
          NODE_ENV=$TEST_ENV npx playwright test --workers=1
        continue-on-error: true

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Parse Report
        if: always()
        run: node scripts/parse-playwright-report.js

      - name: Send Telegram Notification
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.playwright.outcome }}" = "success" ]; then
            STATUS="✅ PASSED"
          else
            STATUS="❌ FAILED"
          fi

          MESSAGE=$(printf "🚀 EMRA AUTOMATION\n\n━━━━━━━━━━━━━━━━━━\n\n%s\n\n📊 TEST SUMMARY\n\n✅ Passed : %s\n❌ Failed : %s\n⚪ Skipped : %s\n⏱ Duration : %ss\n\n━━━━━━━━━━━━━━━━━━\n\n❌ Errors\n%s\n\n━━━━━━━━━━━━━━━━━━\n\n🌍 Environment\n%s\n\n👤 Trigger\n%s\n\n🌿 Branch\n%s\n\n━━━━━━━━━━━━━━━━━━\n\n🔗 Workflow\nhttps://github.com/%s/actions/runs/%s" \
          "$STATUS" \
          "${PASSED:-0}" \
          "${FAILED:-0}" \
          "${SKIPPED:-0}" \
          "${DURATION:-0}" \
          "${ERRORS:-Tidak ada error}" \
          "$TEST_ENV" \
          "${{ github.actor }}" \
          "${{ github.ref_name }}" \
          "${{ github.repository }}" \
          "${{ github.run_id }}")

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"

      - name: Mark Workflow Failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1