name: Playwright Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    container:
      image: kydockertest/bootcamp-automation-playwright:base
      options: --user root

    env:
      NODE_ENV: production

      # =========================================================
      # MAPPING GITHUB SECRETS -> ENVIRONMENT VARIABLE
      # =========================================================
      PRODUCTION_BASE_URL: ${{ secrets.BASE_URL }}
      PRODUCTION_EMAIL: ${{ secrets.EMAIL_EMRA_PROD }}
      PRODUCTION_PASSWORD: ${{ secrets.PASSWORD_EMRA_PROD }}

    steps:
      # =========================================================
      # CHECKOUT SOURCE CODE
      # =========================================================
      - uses: actions/checkout@v4

      # =========================================================
      # INSTALL PROJECT DEPENDENCIES
      # NODE_ENV=development agar devDependencies ikut terinstall
      # =========================================================
      - name: Install dependencies
        env:
          NODE_ENV: development
        run: npm ci

      # =========================================================
      # INSTALL PLAYWRIGHT BROWSER
      # =========================================================
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # =========================================================
      # VERIFY ENVIRONMENT
      # Memastikan seluruh secret berhasil terbaca
      # =========================================================
      - name: Verify Environment
        run: |
          echo "NODE_ENV=$NODE_ENV"

          if [ -z "$PRODUCTION_BASE_URL" ]; then
            echo "❌ PRODUCTION_BASE_URL kosong"
            exit 1
          fi

          if [ -z "$PRODUCTION_EMAIL" ]; then
            echo "❌ PRODUCTION_EMAIL kosong"
            exit 1
          fi

          if [ -z "$PRODUCTION_PASSWORD" ]; then
            echo "❌ PRODUCTION_PASSWORD kosong"
            exit 1
          fi

          echo "✅ Environment Loaded"

      # =========================================================
      # TEST TELEGRAM CONNECTION
      # (Boleh dihapus nanti jika sudah tidak diperlukan)
      # =========================================================
      - name: Test Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ GitHub Actions berhasil terhubung dengan Telegram!"

      # =========================================================
      # RUN PLAYWRIGHT TEST
      # =========================================================
      - name: Run Playwright Test
        run: npx playwright test --workers=1

      # =========================================================
      # UPLOAD PLAYWRIGHT HTML REPORT
      # Tetap diupload walaupun test gagal
      # =========================================================
      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # =========================================================
      # DETERMINE TEST STATUS
      # Menentukan apakah workflow SUCCESS atau FAILED
      # Nilai akan disimpan ke GITHUB_ENV agar dapat dipakai
      # pada step berikutnya.
      # =========================================================
      - name: Determine Test Status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "TEST_STATUS=✅ PASSED" >> $GITHUB_ENV
          else
            echo "TEST_STATUS=❌ FAILED" >> $GITHUB_ENV
          fi

      # =========================================================
      # SEND TELEGRAM NOTIFICATION
      # Step ini SELALU dijalankan walaupun Playwright gagal
      # =========================================================
      - name: Send Telegram Notification
        if: always()
        run: |
          MESSAGE="🚀 EMRA AUTOMATION

          Status
          $TEST_STATUS

          Repository
          ${{ github.repository }}

          Branch
          ${{ github.ref_name }}

          Trigger
          ${{ github.actor }}

          Workflow
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"