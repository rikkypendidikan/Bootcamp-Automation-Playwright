name: Playwright Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    container:
      image: kydockertest/bootcamp-automation-playwright:base
      options: --user root

    env:
      NODE_ENV: production
      PRODUCTION_BASE_URL: ${{ secrets.BASE_URL }}
      PRODUCTION_EMAIL: ${{ secrets.EMAIL_EMRA_PROD }}
      PRODUCTION_PASSWORD: ${{ secrets.PASSWORD_EMRA_PROD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npx playwright test --workers=1
        continue-on-error: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Send Telegram Notification
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ PASSED"
          else
            STATUS="❌ FAILED"
          fi

          MESSAGE=$(printf "🚀 EMRA AUTOMATION\n\n━━━━━━━━━━━━━━━━━━\n\n%s\n\n📊 TEST SUMMARY\n\nRepository: %s\nBranch: %s\nTrigger: %s\n\n━━━━━━━━━━━━━━━━━━\n\n🔗 Workflow\nhttps://github.com/%s/actions/runs/%s\n\n━━━━━━━━━━━━━━━━━━\n\n🤖 Playwright + GitHub Actions" \
            "$STATUS" \
            "${{ github.repository }}" \
            "${{ github.ref_name }}" \
            "${{ github.actor }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"