name: Playwright Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    container:
      image: kydockertest/bootcamp-automation-playwright:base
      options: --user root

    env:
      NODE_ENV: production
      PRODUCTION_BASE_URL: ${{ secrets.BASE_URL }}
      PRODUCTION_EMAIL: ${{ secrets.EMAIL_EMRA_PROD }}
      PRODUCTION_PASSWORD: ${{ secrets.PASSWORD_EMRA_PROD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        env:
          NODE_ENV: development
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Verify Environment
        run: |
          echo "NODE_ENV=$NODE_ENV"
          [ -z "$PRODUCTION_BASE_URL" ] && echo "вќЊ BASE_URL kosong" && exit 1
          [ -z "$PRODUCTION_EMAIL" ] && echo "вќЊ EMAIL kosong" && exit 1
          [ -z "$PRODUCTION_PASSWORD" ] && echo "вќЊ PASSWORD kosong" && exit 1
          echo "вњ… Environment Loaded"

      - name: Test Telegram Connection
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="вњ… GitHub Actions Telegram Connected"

      - name: Run Playwright Test
        run: npx playwright test --workers=1

      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # =========================================================
      # PARSE SUMMARY
      # =========================================================
      - name: Parse Test Summary
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            PASSED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status=="passed")] | length' test-results/results.json)
            FAILED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status=="failed")] | length' test-results/results.json)
            SKIPPED=$(jq '[.suites[].specs[].tests[] | select(.results[-1].status=="skipped")] | length' test-results/results.json)
          else
            PASSED=0
            FAILED=0
            SKIPPED=0
          fi

          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

      # =========================================================
      # STATUS
      # =========================================================
      - name: Determine Test Status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "STATUS=PASSED" >> $GITHUB_ENV
          else
            echo "STATUS=FAILED" >> $GITHUB_ENV
          fi

      # =========================================================
      # TELEGRAM (FULL SAFE STRING ONE-LINE STYLE)
      # =========================================================
      - name: Send Telegram Notification
        if: always()
        run: |
          MESSAGE="рџљЂ EMRA AUTOMATION\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nSTATUS: $STATUS\n\nрџ“Љ TEST SUMMARY\n\nPassed: $PASSED\nFailed: $FAILED\nSkipped: $SKIPPED\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nEnv: Production\nTrigger: ${{ github.actor }}\nBranch: ${{ github.ref_name }}\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nWorkflow:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nPlaywright + GitHub Actions"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"