name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    container:
      image: kydockertest/bootcamp-automation-playwright:base
      options: --user root

    env:
      # =========================
      # BASE ENV (JANGAN production di level global install)
      # =========================
      NODE_ENV: production
      PRODUCTION_BASE_URL: https://www.emra.chat

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # INSTALL DEPENDENCIES (FIXED)
      # =========================
      - name: Install dependencies
        env:
          NODE_ENV: development   # 🔥 INI KUNCI FIX
        run: npm ci

      # =========================
      # INSTALL PLAYWRIGHT BROWSER
      # =========================
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # =========================
      # RUN TESTS
      # =========================
      - name: Run Playwright tests
        run: npx playwright test --workers=1

      # =========================
      # UPLOAD REPORT
      # =========================
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30